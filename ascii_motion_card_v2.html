
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.root { padding: 1.5rem 0; }
.dz {
  border: 1.5px dashed var(--color-border-secondary);
  border-radius: var(--border-radius-lg);
  padding: 2rem 1rem;
  text-align: center;
  cursor: pointer;
  background: var(--color-background-secondary);
  position: relative;
  transition: border-color 0.15s;
}
.dz.over { border-color: var(--color-border-info); background: var(--color-background-info); }
.dz input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.ctrl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 1rem 0; }
.ctrl label { font-size: 12px; color: var(--color-text-secondary); display: block; margin-bottom: 6px; }
.ctrl .val { float: right; font-size: 12px; font-weight: 500; color: var(--color-text-primary); }
.ctrl input[type=range], .ctrl select { width: 100%; }
.ascii-card {
  background: #080808;
  border-radius: var(--border-radius-lg);
  padding: 1rem 1rem 1.5rem;
  margin: 1rem 0;
  border: 0.5px solid #1e1e1e;
  position: relative;
}
.card-corner { position: absolute; font-size: 10px; color: #333; font-family: monospace; }
.tl { top: 8px; left: 12px; }
.tr { top: 8px; right: 12px; }
.bl { bottom: 8px; left: 12px; }
.br { bottom: 8px; right: 12px; }
.card-meta { display: flex; justify-content: space-between; margin-bottom: 8px; }
.card-meta span { font-size: 11px; color: #333; font-family: monospace; }
#ascii-out {
  font-family: monospace;
  font-size: 6.5px;
  line-height: 1.15;
  white-space: pre;
  display: block;
  text-align: left;
  color: #00ff88;
  letter-spacing: 0.4px;
  min-height: 100px;
}
.ascii-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 120px; color: #2a2a2a; font-family: monospace; font-size: 12px; gap: 6px;
}
.progress { height: 3px; background: #111; border-radius: 99px; overflow: hidden; margin: 0.5rem 0; }
.progress-fill { height: 100%; background: #00ff88; border-radius: 99px; width: 0; transition: width 0.1s; }
.status { font-size: 12px; color: var(--color-text-secondary); text-align: center; min-height: 18px; margin: 0.25rem 0; }
.btn-row { display: flex; gap: 8px; margin-top: 1rem; }
.btn-row button { flex: 1; }
.tag { font-size: 11px; padding: 2px 10px; border-radius: 99px; background: var(--color-background-success); color: var(--color-text-success); display: inline-block; margin-bottom: 1rem; }
.section-label { font-size: 12px; color: var(--color-text-secondary); margin: 1rem 0 0.4rem; }
</style>

<div class="root">
  <h2 class="sr-only">ASCII Motion Card Generator v2 — upload a video to convert it into ASCII animation</h2>
  <span class="tag">支持 MP4 · MOV · WebM</span>

  <div class="dz" id="dz">
    <input type="file" id="file-in" accept="video/mp4,video/webm,video/quicktime,video/*">
    <p style="font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px">
      <i class="ti ti-video" aria-hidden="true" style="font-size:20px;vertical-align:-3px;margin-right:6px"></i>上传视频文件
    </p>
    <p style="font-size:13px;color:var(--color-text-secondary)">MP4 · MOV · WebM — 建议10秒以内</p>
  </div>

  <p class="section-label">参数</p>
  <div class="ctrl-grid">
    <div class="ctrl">
      <label>字符密度 <span class="val" id="v-cols">55</span></label>
      <input type="range" id="s-cols" min="25" max="100" value="55" step="5">
    </div>
    <div class="ctrl">
      <label>抓帧速率 <span class="val" id="v-fps">10</span> fps</label>
      <input type="range" id="s-fps" min="4" max="20" value="10" step="2">
    </div>
    <div class="ctrl">
      <label>字符集</label>
      <select id="s-charset">
        <option value="detailed">精细 @#S%?*+;:,.</option>
        <option value="block">方块 █▓▒░ </option>
        <option value="binary">代码 10 </option>
        <option value="minimal">极简 ■□ </option>
      </select>
    </div>
    <div class="ctrl">
      <label>颜色</label>
      <select id="s-color">
        <option value="#00ff88">矩阵绿</option>
        <option value="#ffaa00">琥珀橙</option>
        <option value="#44aaff">赛博蓝</option>
        <option value="#ff66bb">霓虹粉</option>
        <option value="#ffffff">纯白</option>
        <option value="#aaffaa">薄荷</option>
      </select>
    </div>
  </div>

  <div class="progress" id="prog-wrap" style="display:none">
    <div class="progress-fill" id="prog-fill"></div>
  </div>
  <p class="status" id="status">上传视频后开始抓帧</p>

  <div class="ascii-card">
    <span class="card-corner tl">WENDE·STUDIO</span>
    <span class="card-corner tr">ASCII·MOTION</span>
    <span class="card-corner bl" id="c-frame">frame 0/0</span>
    <span class="card-corner br" id="c-fps">— fps</span>
    <div class="card-meta">
      <span id="m-left">◈ STANDBY</span>
      <span id="m-right">——</span>
    </div>
    <pre id="ascii-out"><div class="ascii-empty"><span style="color:#1a1a1a">▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓</span><span>等待视频上传…</span></div></pre>
  </div>

  <div class="btn-row">
    <button id="btn-play" disabled><i class="ti ti-player-play" aria-hidden="true"></i> 播放</button>
    <button id="btn-export" disabled><i class="ti ti-download" aria-hidden="true"></i> 导出 HTML</button>
  </div>
</div>

<video id="vid" muted playsinline crossorigin="anonymous" style="display:none;position:absolute;left:-9999px"></video>
<canvas id="cv" style="display:none;position:absolute;left:-9999px"></canvas>

<script>
const CHARSETS = {
  detailed: '@#S%?*+;:,. ',
  block: '█▓▒░  ',
  binary: '1100  ',
  minimal: '■▪·  '
};

let frames = [];
let playTimer = null;
let frameIdx = 0;
let isPlaying = false;
let lastTs = 0;

const vid = document.getElementById('vid');
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const asciiOut = document.getElementById('ascii-out');
const statusEl = document.getElementById('status');
const progFill = document.getElementById('prog-fill');
const progWrap = document.getElementById('prog-wrap');
const btnPlay = document.getElementById('btn-play');
const btnExport = document.getElementById('btn-export');
const cFrame = document.getElementById('c-frame');
const cFps = document.getElementById('c-fps');
const mLeft = document.getElementById('m-left');

const sCols = document.getElementById('s-cols');
const sFps = document.getElementById('s-fps');
const sCharset = document.getElementById('s-charset');
const sColor = document.getElementById('s-color');

sCols.addEventListener('input', () => document.getElementById('v-cols').textContent = sCols.value);
sFps.addEventListener('input', () => document.getElementById('v-fps').textContent = sFps.value);
sColor.addEventListener('change', () => asciiOut.style.color = sColor.value);

function pixelToChar(lum) {
  const chars = CHARSETS[sCharset.value] || CHARSETS.detailed;
  const idx = Math.floor((1 - lum) * (chars.length - 1));
  return chars[Math.max(0, Math.min(chars.length - 1, idx))];
}

function imageDataToAscii(data, w, h, cols) {
  const charW = w / cols;
  const charH = charW * 2.1;
  const rows = Math.floor(h / charH);
  let out = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const px = Math.floor(c * charW);
      const py = Math.floor(r * charH);
      let sum = 0, cnt = 0;
      const ex = Math.min(px + Math.ceil(charW), w);
      const ey = Math.min(py + Math.ceil(charH), h);
      for (let y = py; y < ey; y++) {
        for (let x = px; x < ex; x++) {
          const i = (y * w + x) * 4;
          sum += data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
          cnt++;
        }
      }
      out += pixelToChar((sum / cnt) / 255);
    }
    out += '\n';
  }
  return out;
}

async function processVideo(file) {
  frames = [];
  frameIdx = 0;
  stopPlay();
  btnPlay.disabled = true;
  btnExport.disabled = true;
  progWrap.style.display = 'block';
  progFill.style.width = '0%';

  const url = URL.createObjectURL(file);
  vid.src = url;

  await new Promise((res, rej) => {
    vid.onloadedmetadata = res;
    vid.onerror = rej;
  });

  const duration = vid.duration;
  const targetFps = parseInt(sFps.value);
  const cols = parseInt(sCols.value);
  const maxFrames = Math.min(Math.floor(duration * targetFps), 240);
  const interval = duration / maxFrames;

  cv.width = cols * 2;
  cv.height = Math.round(cv.width * vid.videoHeight / vid.videoWidth);

  statusEl.textContent = `准备抓帧，共 ${maxFrames} 帧…`;
  mLeft.textContent = '◈ CAPTURING';

  let captured = 0;
  let lastCaptureTime = -1;

  await new Promise(resolve => {
    vid.currentTime = 0;

    function onFrame() {
      if (!vid.paused && !vid.ended) {
        const t = vid.currentTime;
        if (t - lastCaptureTime >= interval - 0.01 && captured < maxFrames) {
          ctx.drawImage(vid, 0, 0, cv.width, cv.height);
          const imgData = ctx.getImageData(0, 0, cv.width, cv.height);
          frames.push(imageDataToAscii(imgData.data, cv.width, cv.height, cols));
          lastCaptureTime = t;
          captured++;
          const pct = Math.round(captured / maxFrames * 100);
          progFill.style.width = pct + '%';
          statusEl.textContent = `抓帧中 ${captured} / ${maxFrames}`;
          cFrame.textContent = `frame ${captured}/${maxFrames}`;
          if (frames.length === 1) showFrame(0);
        }
        if (captured < maxFrames) {
          requestAnimationFrame(onFrame);
        } else {
          vid.pause();
          URL.revokeObjectURL(url);
          done();
        }
      } else if (vid.ended) {
        URL.revokeObjectURL(url);
        done();
      }
    }

    function done() {
      progWrap.style.display = 'none';
      statusEl.textContent = `✓ 完成，共 ${frames.length} 帧`;
      mLeft.textContent = '◈ LIVE';
      btnPlay.disabled = false;
      btnExport.disabled = false;
      resolve();
    }

    vid.play().then(() => {
      requestAnimationFrame(onFrame);
    }).catch(() => {
      statusEl.textContent = '视频格式不支持，请尝试 MP4';
      progWrap.style.display = 'none';
      resolve();
    });
  });

  if (frames.length > 0) startPlay();
}

function showFrame(i) {
  asciiOut.textContent = frames[i] || '';
  cFrame.textContent = `frame ${i+1}/${frames.length}`;
}

function startPlay() {
  if (playTimer) cancelAnimationFrame(playTimer);
  isPlaying = true;
  btnPlay.innerHTML = '<i class="ti ti-player-pause" aria-hidden="true"></i> 暂停';
  const interval = 1000 / parseInt(sFps.value);

  function tick(ts) {
    if (!isPlaying) return;
    if (ts - lastTs >= interval) {
      if (lastTs > 0) cFps.textContent = Math.round(1000 / (ts - lastTs) * 10) / 10 + ' fps';
      lastTs = ts;
      frameIdx = (frameIdx + 1) % frames.length;
      showFrame(frameIdx);
    }
    playTimer = requestAnimationFrame(tick);
  }
  playTimer = requestAnimationFrame(tick);
}

function stopPlay() {
  isPlaying = false;
  if (playTimer) cancelAnimationFrame(playTimer);
  btnPlay.innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> 播放';
}

btnPlay.addEventListener('click', () => {
  if (frames.length === 0) return;
  isPlaying ? stopPlay() : startPlay();
});

btnExport.addEventListener('click', () => {
  if (!frames.length) return;
  const color = sColor.value;
  const fps = parseInt(sFps.value);
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ASCII Motion Card</title>
<style>body{background:#060606;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.card{background:#080808;border:0.5px solid #1e1e1e;border-radius:12px;padding:16px 16px 24px;position:relative;max-width:90vw}
.c{position:absolute;font-size:10px;color:#2a2a2a;font-family:monospace}
.tl{top:8px;left:12px}.tr{top:8px;right:12px}.bl{bottom:8px;left:12px}.br{bottom:8px;right:12px}
.meta{display:flex;justify-content:space-between;margin-bottom:6px}
.meta span{font-size:11px;color:#2a2a2a;font-family:monospace}
pre{font-family:monospace;font-size:6.5px;line-height:1.15;white-space:pre;color:${color};letter-spacing:0.4px}
</style></head><body><div class="card">
<span class="c tl">WENDE·STUDIO</span><span class="c tr">ASCII·MOTION</span>
<span class="c bl" id="cf">frame 0</span><span class="c br" id="fp">— fps</span>
<div class="meta"><span id="ml">◈ LIVE</span><span id="mr"></span></div>
<pre id="out"></pre></div>
<script>
const F=${JSON.stringify(frames)};
let i=0,last=0;const fps=${fps},iv=1000/fps;
const out=document.getElementById('out'),cf=document.getElementById('cf'),fp=document.getElementById('fp');
function tick(ts){if(ts-last>=iv){if(last>0)fp.textContent=Math.round(1000/(ts-last)*10)/10+' fps';last=ts;i=(i+1)%F.length;out.textContent=F[i];cf.textContent='frame '+(i+1)+'/'+F.length;}requestAnimationFrame(tick);}
requestAnimationFrame(tick);
<\/script></body></html>`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
  a.download = 'ascii-motion-card.html';
  a.click();
});

const dz = document.getElementById('dz');
const fileIn = document.getElementById('file-in');
fileIn.addEventListener('change', e => { if (e.target.files[0]) processVideo(e.target.files[0]); });
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  if (e.dataTransfer.files[0]) processVideo(e.dataTransfer.files[0]);
});

asciiOut.style.color = sColor.value;
</script>
